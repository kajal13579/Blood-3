<!DOCTYPE html>
<html>
<head>
    <title>Blood Donation App</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #ff4d4d, #ff9999);
            text-align: center;
            color: white;
        }

        .container {
            background: white;
            color: black;
            padding: 20px;
            margin: 40px auto;
            width: 350px;
            border-radius: 15px;
            box-shadow: 0px 0px 15px gray;
        }

        input {
            display: block;
            margin: 10px auto;
            padding: 10px;
            width: 90%;
            border-radius: 5px;
            border: 1px solid gray;
        }

        button {
            background: red;
            color: white;
            padding: 10px;
            border: none;
            width: 95%;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: darkred;
        }

        .hidden {
            display: none;
        }

        li {
            margin: 10px;
            padding: 10px;
            background: #f2f2f2;
            border-radius: 5px;
            list-style: none;
        }

        h1 {
            margin-top: 20px;
        }
    </style>
</head>

<body>

<h1>🩸 Blood Donation App</h1>

<!-- LOGIN -->
<div class="container" id="loginBox">
    <h2>Login</h2>
    <input type="text" id="username" placeholder="Enter Username">
    <input type="password" id="password" placeholder="Enter Password">
    <button onclick="login()">Login</button>
</div>

<!-- MAIN APP -->
<div class="container hidden" id="appBox">

    <h2>Add Donor</h2>
    <input type="text" id="name" placeholder="Name">
    <input type="text" id="blood" placeholder="Blood Group">
    <input type="text" id="contact" placeholder="Contact">
    <input type="text" id="location" placeholder="Location">

    <button onclick="addDonor()">Add Donor</button>

    <h2>Search</h2>
    <input type="text" id="search" placeholder="Search by Blood Group" onkeyup="searchDonor()">

    <h2>Donor List</h2>
    <ul id="donorList"></ul>

    <button onclick="logout()">Logout</button>

</div>

<script>
    let donors = JSON.parse(localStorage.getItem("donors")) || [];

    function login() {
        let user = document.getElementById("username").value;
        let pass = document.getElementById("password").value;

        if (user === "admin" && pass === "1234") {
            document.getElementById("loginBox").classList.add("hidden");
            document.getElementById("appBox").classList.remove("hidden");
        } else {
            alert("Wrong login details");
        }
    }

    function logout() {
        document.getElementById("loginBox").classList.remove("hidden");
        document.getElementById("appBox").classList.add("hidden");
    }

    function displayDonors(list) {
        let donorList = document.getElementById("donorList");
        donorList.innerHTML = "";

        list.forEach((d, index) => {
            let li = document.createElement("li");
            li.innerHTML = `
                <b>${d.name}</b><br>
                Blood: ${d.blood}<br>
                Contact: ${d.contact}<br>
                Location: ${d.location}<br>
                <button onclick="deleteDonor(${index})">Delete</button>
            `;
            donorList.appendChild(li);
        });
    }

    function addDonor() {
        let name = document.getElementById("name").value;
        let blood = document.getElementById("blood").value;
        let contact = document.getElementById("contact").value;
        let location = document.getElementById("location").value;

        if (!name || !blood || !contact || !location) {
            alert("Fill all fields");
            return;
        }

        donors.push({ name, blood, contact, location });
        localStorage.setItem("donors", JSON.stringify(donors));

        displayDonors(donors);

        document.getElementById("name").value = "";
        document.getElementById("blood").value = "";
        document.getElementById("contact").value = "";
        document.getElementById("location").value = "";
    }

    function deleteDonor(index) {
        donors.splice(index, 1);
        localStorage.setItem("donors", JSON.stringify(donors));
        displayDonors(donors);
    }

    function searchDonor() {
        let value = document.getElementById("search").value.toLowerCase();

        let filtered = donors.filter(d =>
            d.blood.toLowerCase().includes(value)
        );

        displayDonors(filtered);
    }

    displayDonors(donors);
</script>

</body>
</html>
